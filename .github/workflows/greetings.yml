name: Greetings

on: [pull_request_target, issues]

permissions:
  contents: read

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        # Message for first-time issue creators
        issue_message: |
          Welcome to the Open Truth Protocol! 🛡️ 
          
          Thank you for opening your first issue. Our goal is to build the world's first decentralized verification swarm, and your feedback helps us get there. 
          
          Please make sure you've checked our `agents.md` for architectural context. An agent will be with you shortly!
          
        # Message for first-time PR contributors
        pr_message: |
          Incredible! You're helping build the future of digital trust. 🚀
          
          This is your first Pull Request to OTP. Our automated CI/CD suite (CodeQL & Tests) will begin scanning your code momentarily. Please ensure your commits are signed off to comply with our DCO.
          
          We're excited to review your contribution!

name: ClusterFuzzLite batch
on:
  schedule:
    - cron: '0 0 * * *'
permissions:
  contents: read
jobs:
  Batch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Build Fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@8847e35bd64471f48014c0efcf0ca956e5fbb5e0 # v1
        with:
          sanitizer: ${{ matrix.sanitizer }}
          language: python
      - name: Run Fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@8847e35bd64471f48014c0efcf0ca956e5fbb5e0 # v1
        with:
          sanitizer: ${{ matrix.sanitizer }}
          fuzz-seconds: 3600
          mode: 'batch'

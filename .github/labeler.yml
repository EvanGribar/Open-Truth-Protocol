# Pull request label rules for actions/labeler.
# Label naming follows enterprise-style prefixes:
# - area/ for ownership/surface
# - type/ for nature of change

'area/agents':
  - changed-files:
      - any-glob-to-any-file:
          - 'agents/heuristics/**'
          - 'agents/provenance/**'
          - 'agents/web_consensus/**'

'area/orchestrator':
  - changed-files:
      - any-glob-to-any-file:
          - 'agents/orchestrator/**'

'area/shared':
  - changed-files:
      - any-glob-to-any-file:
          - 'shared/**'

'area/tests':
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'

'area/docs':
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'CONTRIBUTING.md'
          - 'AGENTS.md'
          - 'CHANGELOG.md'
          - 'SECURITY.md'
          - 'CODE_OF_CONDUCT.md'
          - 'docs/**'

'area/infra':
  - changed-files:
      - any-glob-to-any-file:
          - 'docker/**'
          - 'docker-compose.yml'
          - 'config/**'

'area/ci-cd':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.pre-commit-config.yaml'

'type/feat':
  - head-branch:
      - '^feat[/-]'
      - '^feature[/-]'

'type/bug':
  - head-branch:
      - '^fix[/-]'
      - '^bugfix[/-]'
      - '^hotfix[/-]'

'type/refactor':
  - head-branch:
      - '^refactor[/-]'

'type/chore':
  - head-branch:
      - '^chore[/-]'
      - '^build[/-]'
      - '^ci[/-]'

'type/docs':
  - head-branch:
      - '^docs[/-]'
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'CONTRIBUTING.md'
          - 'AGENTS.md'
          - 'CHANGELOG.md'
          - 'SECURITY.md'
          - 'CODE_OF_CONDUCT.md'
          - 'docs/**'

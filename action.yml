name: swarm-review
description: Run a swarm of AI reviewers on pull requests with multi-provider support (Anthropic, OpenAI, OpenRouter, custom).
author: GitHub Copilot
inputs:
  github-token:
    description: GitHub token with permission to comment on pull requests.
    required: true
  anthropic-api-key:
    description: Legacy: API key for Anthropic. For multi-provider support, configure provider in .swarm.yml instead.
    required: false
  anthropic-model:
    description: Legacy: Model name for Anthropic. For multi-provider support, configure provider in .swarm.yml instead.
    required: false
    default: claude-3-5-sonnet-latest
  config-path:
    description: Path to the swarm configuration file. Use this to configure providers, agents, and debate settings.
    required: false
    default: .swarm.yml
  check-run-id:
    description: Optional existing check run ID to update after the review.
    required: false
outputs:
  pull-number:
    description: Pull request number processed by this run.
  output-mode:
    description: Render mode used for the posted comment (outcome or full).
  comment-id:
    description: Numeric ID of the created or updated PR comment.
  comment-action:
    description: Whether the PR comment was created or updated.
  comment-url:
    description: URL of the created or updated PR comment when available.
  check-run-updated:
    description: True when a valid check-run-id was provided and used.
runs:
  using: node20
  main: dist/index.js